name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  # ─── Prüfe ob Version neu ist und erstelle ggf. Tag ──────────────────
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Version aus package.json lesen
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # Prüfe ob Tag bereits existiert
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "Tag $TAG existiert bereits – kein neuer Build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "Neuer Tag $TAG – Build starten"
            echo "should_build=true" >> $GITHUB_OUTPUT
            # Tag erstellen
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

  # ─── Windows Build ───────────────────────────────────────────────────
  build-windows:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx @electron/rebuild
      - run: npm run build:win -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/Gerki-Setup-*.exe
            dist/latest.yml
          retention-days: 1

  # ─── macOS Build ────────────────────────────────────────────────────
  build-mac:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true' || startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx @electron/rebuild
      - run: npm run build:mac -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            dist/Gerki-*.dmg
            dist/latest-mac.yml
          retention-days: 1

  # ─── Linux Build ─────────────────────────────────────────────────────
  build-linux:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx @electron/rebuild
      - run: npm run build:linux -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: |
            dist/Gerki-*.AppImage
            dist/Gerki-*.deb
            dist/latest-linux.yml
          retention-days: 1

  # ─── GitHub Release erstellen ────────────────────────────────────────
  release:
    needs: [check-version, build-windows, build-mac, build-linux]
    if: needs.check-version.outputs.should_build == 'true' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: linux-installer
          path: dist/

      - name: Release-Tag bestimmen
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ needs.check-version.outputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - name: GitHub Release erstellen + Dateien hochladen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Gerki ${{ steps.tag.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Gerki ${{ steps.tag.outputs.tag }}

            ### Download
            | Betriebssystem | Datei |
            |---|---|
            | Windows 10/11 (x64) | `Gerki-Setup-${{ steps.tag.outputs.tag }}.exe` |
            | macOS Intel | `Gerki-${{ steps.tag.outputs.tag }}-x64.dmg` |
            | macOS Apple Silicon | `Gerki-${{ steps.tag.outputs.tag }}-arm64.dmg` |
            | Linux (x64) AppImage | `Gerki-${{ steps.tag.outputs.tag }}-x64.AppImage` |
            | Linux (x64) Debian/Ubuntu | `Gerki-${{ steps.tag.outputs.tag }}-x64.deb` |

            ### Systemanforderungen
            - Windows 10/11 (64-bit)
            - macOS 12+ (Monterey oder neuer)
            - Linux: Ubuntu 20.04+ / Debian 11+ / Fedora 35+
            - 4 GB RAM (8 GB empfohlen für Ollama)
            - 2 GB freier Speicherplatz
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/latest.yml
            dist/latest-mac.yml
            dist/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

